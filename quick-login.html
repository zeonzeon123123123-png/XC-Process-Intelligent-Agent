<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速登录 - 管理员测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-user {
            background: #f5f6f7;
            color: #333;
        }
        .btn-user:hover {
            background: #e0e0e0;
        }
        .btn-logout {
            background: #ffebee;
            color: #c62828;
        }
        .btn-logout:hover {
            background: #ffcdd2;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f5f6f7;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🚀 快速登录</h1>
        <p>选择一个角色立即登录系统</p>
        
        <div class="btn-group">
            <button class="btn-admin" onclick="loginAsAdmin()">
                👨‍💼 登录为系统管理员（张三）
            </button>
            <button class="btn-user" onclick="loginAsUser()">
                👤 登录为普通用户（李四）
            </button>
            <button class="btn-logout" onclick="logout()">
                🚪 清除登录状态
            </button>
        </div>
        
        <div class="status" id="status">
            当前状态：未登录
        </div>
    </div>
    
    <script>
        function updateStatus() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            const statusDiv = document.getElementById('status');
            
            if (currentUser) {
                statusDiv.innerHTML = `
                    <strong>✅ 已登录</strong><br>
                    用户：${currentUser.name}<br>
                    角色：${getRoleName(currentUser.role)}<br>
                    部门：${currentUser.department || '未知'}
                `;
            } else {
                statusDiv.innerHTML = '<strong>❌ 未登录</strong><br>请先选择一个角色登录';
            }
        }
        
        function getRoleName(role) {
            const roles = {
                'admin': '系统管理员',
                'ceo': '总经理',
                'manager': '部门经理',
                'employee': '普通员工'
            };
            return roles[role] || role;
        }
        
        function loginAsAdmin() {
            const adminUser = {
                userId: 'USR-2026-010',
                name: '张三',
                email: 'admin@company.com',
                role: 'admin',
                department: '管理层',
                position: '系统管理员',
                avatar: '张'
            };
            localStorage.setItem('currentUser', JSON.stringify(adminUser));
            alert('✅ 已登录为系统管理员：张三\n\n权限说明：\n- 可访问所有页面\n- 可查看完整 Token 统计\n- 可查看完整通讯录\n- 可使用管理后台所有功能');
            updateStatus();
        }
        
        function loginAsUser() {
            const user = {
                userId: 'USR-2026-001',
                name: '李四',
                email: 'lisi@company.com',
                role: 'employee',
                department: '产品部',
                position: '产品经理',
                avatar: '李'
            };
            localStorage.setItem('currentUser', JSON.stringify(user));
            alert('✅ 已登录为：李四（产品经理）');
            updateStatus();
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            alert('✅ 已清除登录状态');
            updateStatus();
        }
        
        // 初始化状态
        updateStatus();
    </script>
</body>
</html>
