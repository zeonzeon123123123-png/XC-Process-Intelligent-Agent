<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - XC 智能体系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            display: flex;
        }

        .login-left {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .login-right {
            flex: 1;
            background: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
            padding: 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #0066ff;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #8f959e;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-title {
            font-size: 24px;
            font-weight: 600;
            color: #1d2129;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d2129;
            margin-bottom: 8px;
        }

        .form-group label .required {
            color: #f53f3f;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e6eb;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #0066ff;
            color: white;
        }

        .btn-primary:hover {
            background: #0052cc;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,102,255,0.3);
        }

        .btn-secondary {
            background: #f5f6f7;
            color: #646a73;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: #e5e6eb;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #8f959e;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e6eb;
        }

        .divider span {
            padding: 0 16px;
        }

        .right-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .right-desc {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .feature-list {
            list-style: none;
        }

        .feature-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .switch-form {
            text-align: center;
            margin-top: 20px;
            color: #8f959e;
            font-size: 14px;
        }

        .switch-form a {
            color: #0066ff;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-form a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #f2f3f5;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }

        .password-strength.weak .password-strength-bar {
            width: 33%;
            background: #f53f3f;
        }

        .password-strength.medium .password-strength-bar {
            width: 66%;
            background: #ff7a45;
        }

        .password-strength.strong .password-strength-bar {
            width: 100%;
            background: #00b365;
        }

        .password-tip {
            font-size: 12px;
            color: #8f959e;
            margin-top: 8px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }

            .login-right {
                display: none;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 左侧表单区 -->
        <div class="login-left">
            <div class="logo">🤖 XC 智能体系统</div>
            <p class="subtitle">企业级智能体协作平台</p>

            <!-- 登录表单 -->
            <div id="loginForm">
                <h2 class="form-title">欢迎回来</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>邮箱 <span class="required">*</span></label>
                        <input type="email" id="loginEmail" required placeholder="请输入公司邮箱">
                    </div>
                    <div class="form-group">
                        <label>密码 <span class="required">*</span></label>
                        <input type="password" id="loginPassword" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn btn-primary">登录</button>
                </form>
                <div class="switch-form">
                    还没有账号？<a onclick="showRegister()">立即注册</a>
                </div>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="hidden">
                <h2 class="form-title">创建账号</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>姓名 <span class="required">*</span></label>
                            <input type="text" id="regName" required placeholder="真实姓名">
                        </div>
                        <div class="form-group">
                            <label>工号 <span class="required">*</span></label>
                            <input type="text" id="regEmployeeId" required placeholder="如：EMP-2026-001">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>邮箱 <span class="required">*</span></label>
                        <input type="email" id="regEmail" required placeholder="公司邮箱">
                    </div>
                    <div class="form-group">
                        <label>手机号 <span class="required">*</span></label>
                        <input type="tel" id="regPhone" required placeholder="11 位手机号">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>所在部门 <span class="required">*</span></label>
                            <select id="regDepartment" required>
                                <option value="">请选择部门</option>
                                <option value="产品部">产品部</option>
                                <option value="项目部">项目部</option>
                                <option value="硬件部">硬件部</option>
                                <option value="软件部">软件部</option>
                                <option value="结构部">结构部</option>
                                <option value="测试部">测试部</option>
                                <option value="工厂">工厂</option>
                                <option value="管理层">管理层</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>职务 <span class="required">*</span></label>
                            <input type="text" id="regPosition" required placeholder="如：产品经理">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>直接上级 <span class="required">*</span></label>
                        <input type="text" id="regManager" required placeholder="直属主管姓名">
                    </div>
                    <div class="form-group">
                        <label>密码 <span class="required">*</span></label>
                        <input type="password" id="regPassword" required placeholder="8-20 位，含字母和数字" oninput="checkPasswordStrength()">
                        <div class="password-strength" id="passwordStrength">
                            <div class="password-strength-bar"></div>
                        </div>
                        <p class="password-tip">密码长度 8-20 位，必须包含字母和数字</p>
                    </div>
                    <div class="form-group">
                        <label>确认密码 <span class="required">*</span></label>
                        <input type="password" id="regConfirmPassword" required placeholder="再次输入密码">
                    </div>
                    <button type="submit" class="btn btn-primary">注册</button>
                </form>
                <div class="switch-form">
                    已有账号？<a onclick="showLogin()">立即登录</a>
                </div>
            </div>
        </div>

        <!-- 右侧宣传区 -->
        <div class="login-right">
            <h1 class="right-title">智能协作，高效研发</h1>
            <p class="right-desc">一站式智能体协作平台，助力研发团队提升效率</p>
            <ul class="feature-list">
                <li>
                    <div class="feature-icon">📊</div>
                    <span>9 大专业智能体协同工作</span>
                </li>
                <li>
                    <div class="feature-icon">📈</div>
                    <span>Token 使用实时监控统计</span>
                </li>
                <li>
                    <div class="feature-icon">👥</div>
                    <span>企业通讯录与权限管理</span>
                </li>
                <li>
                    <div class="feature-icon">📝</div>
                    <span>文档自动生成与同步</span>
                </li>
                <li>
                    <div class="feature-icon">🔒</div>
                    <span>基于角色的访问控制</span>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // 模拟用户数据库
        const userDatabase = [
            // 默认管理员账号
            {
                userId: 'USR-2026-001',
                name: '系统管理员',
                employeeId: 'EMP-0001',
                email: 'admin@xc.com',
                phone: '13800138000',
                department: '管理层',
                position: '总经理',
                manager: null,
                role: 'ceo',
                password: btoa('Admin@123456'),
                avatar: '系',
                status: 'active'
            },
            // 部门经理账号
            {
                userId: 'USR-2026-002',
                name: '张经理',
                employeeId: 'EMP-0002',
                email: 'manager@xc.com',
                phone: '13800138001',
                department: '产品部',
                position: '产品总监',
                manager: '系统管理员',
                role: 'manager',
                password: btoa('Manager@123'),
                avatar: '张',
                status: 'active'
            },
            // 普通员工账号
            {
                userId: 'USR-2026-003',
                name: '李员工',
                employeeId: 'EMP-0003',
                email: 'user@xc.com',
                phone: '13800138002',
                department: '软件部',
                position: '软件工程师',
                manager: '张经理',
                role: 'employee',
                password: btoa('User@123'),
                avatar: '李',
                status: 'active'
            }
        ];
        
        // 预存到 localStorage（首次访问时）
        if (!localStorage.getItem('defaultUsersInitialized')) {
            localStorage.setItem('defaultUsers', JSON.stringify(userDatabase));
            localStorage.setItem('defaultUsersInitialized', 'true');
        }

        // 显示注册表单
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        // 显示登录表单
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        // 检查密码强度
        function checkPasswordStrength() {
            const password = document.getElementById('regPassword').value;
            const strengthEl = document.getElementById('passwordStrength');
            
            strengthEl.classList.remove('weak', 'medium', 'strong');
            
            if (password.length === 0) {
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            if (strength <= 2) {
                strengthEl.classList.add('weak');
            } else if (strength <= 4) {
                strengthEl.classList.add('medium');
            } else {
                strengthEl.classList.add('strong');
            }
        }

        // 处理注册
        function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('regName').value;
            const employeeId = document.getElementById('regEmployeeId').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const department = document.getElementById('regDepartment').value;
            const position = document.getElementById('regPosition').value;
            const manager = document.getElementById('regManager').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            // 验证密码
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            if (password.length < 8 || !/[a-zA-Z]/.test(password) || !/\d/.test(password)) {
                alert('密码必须为 8-20 位，且包含字母和数字');
                return;
            }
            
            // 检查邮箱是否已存在
            if (userDatabase.find(u => u.email === email)) {
                alert('该邮箱已被注册');
                return;
            }
            
            // 根据职位自动分配角色
            let role = 'employee';
            if (position.includes('总监') || position.includes('经理')) {
                role = 'manager';
            } else if (position.includes('主管') || position.includes('组长')) {
                role = 'supervisor';
            } else if (position.includes('总经理') || position.includes('CEO') || position.includes('副总')) {
                role = 'ceo';
            }
            
            // 创建用户
            const newUser = {
                userId: 'USR-' + new Date().getFullYear() + '-' + String(userDatabase.length + 1).padStart(3, '0'),
                name,
                employeeId,
                email,
                phone,
                department,
                position,
                manager,
                role,
                password: btoa(password), // 简单加密（实际应使用 bcrypt）
                avatar: name[0],
                status: 'active'
            };
            
            userDatabase.push(newUser);
            
            // 保存到 localStorage
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            
            alert('注册成功！');
            window.location.href = 'index.html';
        }

        // 处理登录
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // 从 localStorage 获取用户数据库
            const storedUsers = JSON.parse(localStorage.getItem('defaultUsers') || '[]');
            const allUsers = [...userDatabase, ...storedUsers];
            
            // 查找用户
            const user = allUsers.find(u => u.email === email && u.password === btoa(password));
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                // 根据角色显示不同提示
                let roleText = '';
                if (user.role === 'ceo' || user.role === 'admin') {
                    roleText = '管理员';
                } else if (user.role === 'manager') {
                    roleText = '部门经理';
                } else {
                    roleText = '用户';
                }
                
                alert('登录成功！欢迎，' + user.name + ' (' + roleText + ')');
                
                // 管理员跳转到管理后台，其他人跳转到首页
                if (user.role === 'ceo' || user.role === 'admin' || user.role === 'manager') {
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 500);
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert('登录失败：邮箱或密码错误\n\n提示：请使用默认管理员账号登录\n邮箱：admin@xc.com\n密码：Admin@123456');
            }
        }

        // 检查是否已登录
        window.addEventListener('DOMContentLoaded', function() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
